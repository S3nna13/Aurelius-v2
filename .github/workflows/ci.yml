name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install fastapi pydantic rich pytest ruff

      - name: Ruff
        run: python -m ruff check src aurelius_cli tests

      - name: Pytest
        run: python -m pytest
